<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work — Manal Chaib Photography</title>
    <meta name="description"
        content="Photography portfolio of Manal Chaib. Browse portrait, street, editorial and documentary series." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div class="grain" aria-hidden="true"></div>
    <div class="cursor" id="cursor" aria-hidden="true">♥</div>
    <div class="cursor-dot" id="cursor-dot" aria-hidden="true">♥</div>

    <nav class="nav" id="nav">
        <div class="nav-left">
            <a href="index.html" class="nav-logo">Manal Chaib</a>
        </div>
        <div class="nav-right">
            <a href="gallery.html" class="nav-link" aria-current="page">Work</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="index.html#contact" class="nav-link">Contact</a>
        </div>
    </nav>

    <section class="folder-diagram">
        <div class="folder-diagram-inner">
            <svg class="diagram-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
                <!-- Smooth curved paths instead of solid lines -->
                <path class="fairy-string" d="M50,50 Q25,35 20,25" />
                <path class="fairy-string" d="M50,50 Q75,35 80,25" />
                <path class="fairy-string" d="M50,50 Q25,65 20,75" />
                <path class="fairy-string" d="M50,50 Q75,65 80,75" />
            </svg>

            <!-- Center -->
            <div class="folder-node root-folder">
                <span class="folder-icon text-star">✦</span>
                <span class="folder-name">Ideas</span>
            </div>

            <!-- Nodes -->
            <div class="folder-node sub-folder node-tl" data-target="folder-football">
                <span class="folder-icon text-star">✦</span>
                <span class="folder-name">Football</span>
            </div>
            <div class="folder-node sub-folder node-tr" data-target="folder-korea">
                <span class="folder-icon text-star">✦</span>
                <span class="folder-name">Korea 2025</span>
            </div>
            <div class="folder-node sub-folder node-bl" data-target="folder-sudan">
                <span class="folder-icon text-star">✦</span>
                <span class="folder-name">Steps for Sudan</span>
            </div>
            <div class="folder-node sub-folder node-br" data-target="folder-bakery">
                <span class="folder-icon text-star">✦</span>
                <span class="folder-name">Mimis Bakery</span>
            </div>
        </div>
    </section>

    <!-- Folder Contents (360 3D Carousel Overlays) -->
    <div class="folder-overlays">
        <div class="folder-view" id="folder-football">
            <button class="close-folder">← Back to Ideas</button>
            <div class="carousel-3d-wrapper">
                <h2 class="folder-title center-title">Football</h2>
                <div class="carousel-3d-scene">
                    <img src="images/DSCF1095.jpeg" class="carousel-img" alt="Football">
                    <img src="images/DSCF1105.jpeg" class="carousel-img" alt="Football">
                    <img src="images/DSCF1095.jpeg" class="carousel-img" alt="Football">
                    <img src="images/DSCF1105.jpeg" class="carousel-img" alt="Football">
                    <img src="images/DSCF1095.jpeg" class="carousel-img" alt="Football">
                    <img src="images/DSCF1105.jpeg" class="carousel-img" alt="Football">
                </div>
            </div>
        </div>

        <div class="folder-view" id="folder-korea">
            <button class="close-folder">← Back to Ideas</button>
            <div class="carousel-3d-wrapper">
                <h2 class="folder-title center-title">Korea 2025</h2>
                <div class="carousel-3d-scene">
                    <img src="images/DSCF4329.JPG" class="carousel-img" alt="Korea 2025">
                    <img src="images/DSCF4329.JPG" class="carousel-img" alt="Korea 2025">
                    <img src="images/DSCF4329.JPG" class="carousel-img" alt="Korea 2025">
                    <img src="images/DSCF4329.JPG" class="carousel-img" alt="Korea 2025">
                    <img src="images/DSCF4329.JPG" class="carousel-img" alt="Korea 2025">
                    <img src="images/DSCF4329.JPG" class="carousel-img" alt="Korea 2025">
                </div>
            </div>
        </div>

        <div class="folder-view" id="folder-sudan">
            <button class="close-folder">← Back to Ideas</button>
            <div class="carousel-3d-wrapper">
                <h2 class="folder-title center-title">Steps for Sudan</h2>
                <div class="carousel-3d-scene">
                    <img src="images/DSCF1935.jpg" class="carousel-img" alt="Sudan">
                    <img src="images/DSCF1254.jpeg" class="carousel-img" alt="Sudan">
                    <img src="images/DSCF1935.jpg" class="carousel-img" alt="Sudan">
                    <img src="images/DSCF1254.jpeg" class="carousel-img" alt="Sudan">
                    <img src="images/DSCF1935.jpg" class="carousel-img" alt="Sudan">
                    <img src="images/DSCF1254.jpeg" class="carousel-img" alt="Sudan">
                </div>
            </div>
        </div>

        <div class="folder-view" id="folder-bakery">
            <button class="close-folder">← Back to Ideas</button>
            <div class="carousel-3d-wrapper">
                <h2 class="folder-title center-title">Mimis Bakery</h2>
                <div class="carousel-3d-scene">
                    <img src="images/DSCF4303.JPG" class="carousel-img" alt="Bakery">
                    <img src="images/DSCF4240.JPG" class="carousel-img" alt="Bakery">
                    <img src="images/DSCF1199.jpeg" class="carousel-img" alt="Bakery">
                    <img src="images/DSCF4303.JPG" class="carousel-img" alt="Bakery">
                    <img src="images/DSCF4240.JPG" class="carousel-img" alt="Bakery">
                    <img src="images/DSCF1199.jpeg" class="carousel-img" alt="Bakery">
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image lightbox">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close lightbox">✕</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    </div>

    <script src="script.js"></script>
</body>

</html>
